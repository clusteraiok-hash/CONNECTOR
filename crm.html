<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connector CRM — Dashboard</title>
    <meta name="description" content="Connector CRM — Manage your personal CRM and client relationships">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
        .drop-zone { transition: all 0.2s ease; }
    </style>
</head>

<body class="min-h-screen bg-[#F7F8FA]">

    <div class="w-full h-screen flex overflow-hidden">

        <!-- Sidebar -->
        <aside id="sidebar" class="w-[250px] bg-white flex flex-col border-r border-gray-100 shrink-0">
        </aside>

        <!-- Main Area -->
        <main class="flex-1 flex flex-col min-w-0">

            <!-- Top Header -->
            <header id="topHeader" class="h-14 px-6 flex items-center justify-between shrink-0 border-b border-gray-100 bg-white">
            </header>

            <!-- Page Content -->
            <div id="mainContent" class="flex-1 overflow-y-auto px-6 pb-8 pt-5">
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/csv.js"></script>
    <script src="js/contacts.js"></script>
    <script src="js/deals.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>

</html>
