<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connector CRM — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FB; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-active { background-color: white; color: #111827; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .card-shadow { box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.05), 0 1px 2px -1px rgb(0 0 0 / 0.05); }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-[#F8F9FB] border-r border-gray-200 flex flex-col shrink-0">
        <div class="p-6 mb-2">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                    <i data-lucide="layers" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-lg font-bold tracking-tight text-gray-900">Connector</span>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-1 overflow-y-auto no-scrollbar">
            <button onclick="App.navigate('dashboard')" data-nav="dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-900 transition-all">
                <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
            </button>
            <button onclick="App.navigate('contacts')" data-nav="contacts" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-900 transition-all">
                <i data-lucide="users" class="w-5 h-5"></i> Leads & Contacts
            </button>
            <button onclick="App.navigate('pipeline')" data-nav="pipeline" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-900 transition-all">
                <i data-lucide="trello" class="w-5 h-5"></i> Deals Pipeline
            </button>
            <button onclick="App.navigate('analytics')" data-nav="analytics" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-900 transition-all">
                <i data-lucide="bar-chart-2" class="w-5 h-5"></i> Analytics
            </button>
            <button onclick="App.navigate('tasks')" data-nav="tasks" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-900 transition-all">
                <i data-lucide="check-square" class="w-5 h-5"></i> Tasks & Activities
            </button>
            <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 cursor-not-allowed">
                <i data-lucide="message-square" class="w-5 h-5"></i> Messages
            </button>
            <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 cursor-not-allowed">
                <i data-lucide="settings" class="w-5 h-5"></i> Settings
            </button>
        </nav>

        <div class="p-4 mx-4 mb-6 bg-white border border-gray-100 rounded-2xl shadow-sm">
            <h4 class="text-sm font-bold text-gray-900 mb-1">Upgrade to Pro</h4>
            <p class="text-[11px] text-gray-500 mb-3 leading-relaxed">Unlock advanced features and unlimited contacts.</p>
            <button class="w-full py-2.5 bg-[#FFF9E5] text-[#D9A600] text-sm font-bold rounded-xl hover:bg-[#FFF4D0] transition-colors">Upgrade Now</button>
        </div>

        <div class="px-6 py-4 border-t border-gray-200">
            <a href="index.html" class="flex items-center gap-3 text-sm font-medium text-gray-400 hover:text-gray-900 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Workspaces
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 bg-white">
        <!-- Header -->
        <header class="h-20 border-b border-gray-100 flex items-center justify-between px-8 shrink-0">
            <div class="flex-1 max-w-xl relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300"></i>
                <input type="text" placeholder="Search contacts, deals, tasks..." class="w-full pl-11 pr-4 py-2.5 bg-gray-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-gray-100 outline-none">
            </div>
            
            <div class="flex items-center gap-4">
                <button class="p-2 text-gray-400 hover:text-gray-900"><i data-lucide="zap" class="w-5 h-5"></i></button>
                <button class="p-2 text-gray-400 hover:text-gray-900 relative"><i data-lucide="bell" class="w-5 h-5"></i><span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span></button>
                <div class="h-8 w-[1px] bg-gray-100 mx-2"></div>
                <div class="flex items-center gap-3">
                    <span class="text-sm font-bold text-gray-900">NOMAN GAZI</span>
                    <div class="w-9 h-9 bg-gray-900 rounded-full flex items-center justify-center text-white text-xs font-bold shadow-lg">NG</div>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="mainContent" class="flex-1 overflow-y-auto p-8 no-scrollbar bg-gray-50/50">
            <!-- Content will be injected here -->
        </div>
    </main>

    <script src="js/store.js"></script>
    <script src="js/csv.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/contacts.js"></script>
    <script src="js/deals.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
